<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream - Gerda Jansen</title>
  <style>
      * {
          box-sizing: border-box;
      }

      html {
          height: 100%;
      }

      body {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: stretch;
          height: 100%;
          margin: 0;
          font-family: Arial, sans-serif;
          text-align: center;
          background-color: #bccccf;
      }

      .content {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
      }

      .container {
          background-color: #e9f0f1;
          padding: 50px 30px;
          box-shadow: 0 2px 8px #0003;
      }

      h3 {
          margin: 0;
          opacity: 0.9;
      }

      #countdown {
          font-size: 3rem;
          margin-bottom: 30px;
          display: flex;
          justify-content: center;
          align-items: center;
          opacity: 0.7;

          #seconds {
              font-size: 0.7em;
              opacity: 0.5;
          }
      }

      #date {
          color: #0007;
          font-size: 0.9rem;
      }

      #live-button {
          display: none;
          padding: 10px 20px;
          font-size: 1.5rem;
          color: #fff;
          background-color: #007BFF;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          text-decoration: none;
      }

      #live-button:hover {
          background-color: #0056b3;
      }

      footer {
          font-size: 1rem;
          color: #555;
          padding: 20px;
      }
  </style>
</head>
<body>
<div class="content">
  <div class="container">
    <h5>Live Stream</h5>
    <h2>Begrafnis van Gerda Jansen</h2>

    <div id="countdown">
      <span id="days"></span>
      <span id="hours"></span>
      <span id="minutes"></span>
      <span id="seconds"></span>
    </div>
    <div id="date"></div>

    <a id="live-button" href="https://view.yololiv.com/live/1417364353455230976" target="_self">Maak opname oop</a>
  </div>
</div>

<script>
  const countdownElement = document.getElementById("countdown");
  const liveButton = document.getElementById("live-button");
  const targetDate = new Date("2026-03-31T09:00:00Z"); // Adjusted for GMT+2

  const daysElement = document.getElementById("days");
  const hoursElement = document.getElementById("hours");
  const minutesElement = document.getElementById("minutes");
  const secondsElement = document.getElementById("seconds");
  const dateElement = document.getElementById("date");

  Date.prototype.format = function(format) {
    return format
      // .replace(/%dddd/g, locale.en.constants.date.days[this.getDay()])
      // .replace(/%dd/g, locale.en.constants.date.days_short[this.getDay()])
      .replace(/%dd/g, this.getDate().toString().padStart(2, '0'))
      .replace(/%d/g, this.getDate().toString())
      // .replace(/%mmmm/g, locale.en.constants.date.months[this.getMonth()])
      // .replace(/%mmm/g, locale.en.constants.date.months_short[this.getMonth()])
      .replace(/%mm/g, (this.getMonth() + 1).toString().padStart(2, '0'))
      .replace(/%m/g, (this.getMonth() + 1).toString())
      .replace(/%YYYY/g, this.getFullYear().toString())
      .replace(/%YY/g, (this.getFullYear() % 100).toString())
      .replace(/%Y/g, this.getFullYear().toString())
      .replace(/%HH/g, this.getHours().toString().padStart(2, '0'))
      .replace(/%H/g, this.getHours().toString())
      .replace(/%MM/g, this.getMinutes().toString().padStart(2, '0'))
      .replace(/%M/g, this.getMinutes().toString())
      .replace(/%SS/g, this.getSeconds().toString().padStart(2, '0'))
      .replace(/%S/g, this.getSeconds().toString())
      .replace(/%f/g, this.getMilliseconds().toString().padStart(3, '0'));
  }


  const padStart = (str, targetLength, padString = " ") => {
    str = String(str);
    padString = String(padString);

    if (str.length >= targetLength) {
      return str;
    }

    const padding = padString.repeat(Math.ceil((targetLength - str.length) / padString.length)).slice(0, targetLength - str.length);
    return padding + str;
  };

  const updateCountdown = () => {
    const now = new Date();
    const timeDifference = targetDate - now;

    if (timeDifference <= -4 * 3600000) {
      countdownElement.textContent = "Kyk die live stream terug:";
      liveButton.style.display = "inline-block";
    } else if (timeDifference <= 0) {
      countdownElement.textContent = "Die live stream het begin!";
      liveButton.style.display = "inline-block";
    } else if (timeDifference <= 3600000) { // Within 1 hour
      countdownElement.textContent = "Die live stream gaan nou begin";
      liveButton.style.display = "inline-block";
    } else {
      const days = targetDate.getDate() - now.getDate();
      const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);


      daysElement.textContent = days > 1 ? `Nog ${days} dae` : `Nog 1 dag`;
      hoursElement.textContent = `${hours}`;
      minutesElement.textContent = `:${padStart(minutes, 2, "0")}`;
      secondsElement.textContent = `:${padStart(seconds, 2, "0")}`;

      dateElement.textContent = targetDate.format("%dd-%mm-%YYYY om %HH:%MM");

      if (days > 0) {
        daysElement.style.display = "inline-block";
        hoursElement.style.display = "none";
        minutesElement.style.display = "none";
        secondsElement.style.display = "none";
      } else {
        daysElement.style.display = "none";
        hoursElement.style.display = "inline-block";
        minutesElement.style.display = "inline-block";
        secondsElement.style.display = "inline-block";
      }
    }
  };

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>
</body>
</html>
